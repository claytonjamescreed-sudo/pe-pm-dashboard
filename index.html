<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacific Enclosures — Project Management</title>
    <style>
        /* ===== Reset & Base ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0f172a;
            --bg-card: #1e293b;
            --bg-card-hover: #263548;
            --bg-surface: #162032;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --text-dim: #64748b;
            --border: #334155;
            --blue: #3b82f6;
            --blue-glow: rgba(59, 130, 246, 0.15);
            --green: #22c55e;
            --green-bg: rgba(34, 197, 94, 0.1);
            --amber: #f59e0b;
            --amber-bg: rgba(245, 158, 11, 0.1);
            --red: #ef4444;
            --red-bg: rgba(239, 68, 68, 0.1);
            --purple: #a78bfa;
            --purple-bg: rgba(167, 139, 250, 0.1);
            --cyan: #22d3ee;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 1px 3px rgba(0,0,0,0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
        }

        /* ===== Header ===== */
        .header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            height: 64px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            height: 100%;
            gap: 16px;
        }

        .header-logo {
            height: 40px;
            width: auto;
        }

        .header-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 0.5px;
        }

        .header-divider {
            width: 1px;
            height: 28px;
            background: var(--border);
            margin: 0 8px;
        }

        .header-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-date {
            font-size: 13px;
            color: var(--text-dim);
        }

        .btn-download {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 7px 14px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }

        .btn-download:hover {
            border-color: var(--blue);
            background: var(--blue-glow);
        }

        /* ===== Main ===== */
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 28px 32px;
        }

        /* ===== Summary Stats ===== */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: border-color 0.2s;
        }

        .stat-card:hover {
            border-color: var(--blue);
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* ===== Project Cards ===== */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(480px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .project-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: border-color 0.2s, transform 0.2s;
        }

        .project-card:hover {
            border-color: var(--blue);
            transform: translateY(-2px);
        }

        .project-card-header {
            padding: 20px 24px;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
        }

        .project-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .project-desc {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .project-status-badge {
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .badge-active { background: var(--green-bg); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
        .badge-planning { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(245,158,11,0.2); }
        .badge-review { background: var(--purple-bg); color: var(--purple); border: 1px solid rgba(167,139,250,0.2); }
        .badge-paused { background: var(--red-bg); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
        .badge-pipeline { background: rgba(100,116,139,0.1); color: #94a3b8; border: 1px solid rgba(100,116,139,0.2); }
        .badge-production { background: rgba(59,130,246,0.1); color: #3b82f6; border: 1px solid rgba(59,130,246,0.2); }
        .badge-beta { background: rgba(245,158,11,0.1); color: #f59e0b; border: 1px solid rgba(245,158,11,0.2); }
        .badge-completed { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }

        /* Completed project card */
        .project-card.completed-card {
            border-left: 3px solid var(--green);
        }

        /* Progress bar */
        .project-progress {
            padding: 0 24px;
            margin-bottom: 16px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .progress-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .progress-percent {
            font-size: 13px;
            font-weight: 700;
            color: var(--blue);
        }

        .progress-track {
            width: 100%;
            height: 8px;
            background: var(--bg);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--blue), #60a5fa);
            transition: width 0.5s ease;
        }

        /* Version & Tech */
        .project-meta {
            padding: 0 24px 16px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .meta-tag {
            font-size: 11px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 6px;
            background: var(--bg);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .meta-tag.version {
            color: var(--cyan);
            border-color: rgba(34,211,238,0.2);
            background: rgba(34,211,238,0.08);
        }

        .meta-tag.tech {
            color: var(--purple);
            border-color: rgba(167,139,250,0.15);
            background: rgba(167,139,250,0.06);
        }

        .meta-tag.deploy {
            color: var(--green);
            border-color: rgba(34,197,94,0.2);
            background: rgba(34,197,94,0.06);
        }

        /* Milestones */
        .project-milestones {
            padding: 0 24px 20px;
        }

        .milestones-header {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .milestones-done-badge {
            font-size: 11px;
            font-weight: 700;
            color: var(--green);
            background: var(--green-bg);
            padding: 2px 8px;
            border-radius: 10px;
            border: 1px solid rgba(34,197,94,0.2);
        }

        .milestones-summary {
            margin-bottom: 12px;
        }

        .milestone-section-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 6px;
            margin-top: 10px;
        }

        .milestone-section-label.current-label {
            color: var(--blue);
        }

        .milestone-section-label.upcoming-label {
            color: var(--text-dim);
        }

        .milestones-expand {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            color: var(--blue);
            cursor: pointer;
            padding: 6px 0;
            user-select: none;
            transition: color 0.15s;
            background: none;
            border: none;
        }

        .milestones-expand:hover {
            color: #60a5fa;
        }

        .milestones-expand svg {
            transition: transform 0.2s;
        }

        .milestones-expand.expanded svg {
            transform: rotate(180deg);
        }

        .milestones-full {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease;
            border-top: 1px solid transparent;
        }

        .milestones-full.expanded {
            max-height: 3000px;
            border-top-color: var(--border);
            padding-top: 10px;
            margin-top: 6px;
        }

        .milestone-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 0;
            font-size: 13px;
        }

        .milestone-check {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .milestone-check.done {
            background: var(--green);
            border-color: var(--green);
        }

        .milestone-check.done svg {
            display: block;
        }

        .milestone-check svg {
            display: none;
            width: 10px;
            height: 10px;
        }

        .milestone-check.current {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px var(--blue-glow);
        }

        .milestone-text {
            color: var(--text-muted);
        }

        .milestone-text.done {
            color: var(--text-dim);
            text-decoration: line-through;
        }

        .milestone-text.current {
            color: var(--text);
            font-weight: 600;
        }

        .milestone-date {
            margin-left: auto;
            font-size: 11px;
            color: var(--text-dim);
            white-space: nowrap;
        }

        /* ===== Section Titles ===== */
        .section-title {
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ===== Timeline ===== */
        .timeline {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 32px;
        }

        .timeline-item {
            display: flex;
            gap: 16px;
            padding-bottom: 20px;
            position: relative;
        }

        .timeline-item:last-child {
            padding-bottom: 0;
        }

        .timeline-line {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 24px;
            flex-shrink: 0;
        }

        .timeline-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--border);
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .timeline-dot.green { background: var(--green); box-shadow: 0 0 8px rgba(34,197,94,0.3); }
        .timeline-dot.blue { background: var(--blue); box-shadow: 0 0 8px rgba(59,130,246,0.3); }
        .timeline-dot.amber { background: var(--amber); box-shadow: 0 0 8px rgba(245,158,11,0.3); }
        .timeline-dot.purple { background: var(--purple); box-shadow: 0 0 8px rgba(167,139,250,0.3); }

        .timeline-connector {
            width: 2px;
            flex: 1;
            background: var(--border);
            min-height: 8px;
        }

        .timeline-content {
            padding-top: 0;
            flex: 1;
        }

        .timeline-date {
            font-size: 11px;
            color: var(--text-dim);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .timeline-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 2px;
        }

        .timeline-desc {
            font-size: 13px;
            color: var(--text-muted);
        }

        .timeline-project-tag {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        /* ===== Activity Feed ===== */
        .activity-feed {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .activity-item {
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-item:hover {
            background: var(--bg-card-hover);
        }

        .activity-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 14px;
        }

        .activity-text {
            flex: 1;
            font-size: 13px;
            color: var(--text-muted);
        }

        .activity-text strong {
            color: var(--text);
            font-weight: 600;
        }

        .activity-time {
            font-size: 11px;
            color: var(--text-dim);
            white-space: nowrap;
        }

        /* ===== Archive ===== */
        .archive-list {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 32px;
        }

        .archive-empty {
            padding: 32px 20px;
            text-align: center;
            color: var(--text-dim);
            font-size: 14px;
        }

        .archive-item {
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }

        .archive-item:last-child {
            border-bottom: none;
        }

        .archive-item:hover {
            background: var(--bg-card-hover);
        }

        .archive-icon {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            background: var(--blue-glow);
            color: var(--blue);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .archive-info {
            flex: 1;
        }

        .archive-week {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }

        .archive-generated {
            font-size: 12px;
            color: var(--text-dim);
        }

        .archive-source {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .archive-source.saved {
            color: var(--green);
            background: var(--green-bg);
            border: 1px solid rgba(34,197,94,0.2);
        }

        .archive-source.local {
            color: var(--amber);
            background: var(--amber-bg);
            border: 1px solid rgba(245,158,11,0.2);
        }

        .archive-actions {
            display: flex;
            gap: 8px;
        }

        .archive-btn {
            font-size: 12px;
            font-weight: 600;
            padding: 5px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text-muted);
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }

        .archive-btn:hover {
            border-color: var(--blue);
            color: var(--text);
        }

        /* Archive preview modal */
        .archive-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .archive-modal-overlay.visible {
            display: flex;
        }

        .archive-modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            width: 90%;
            max-width: 700px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
        }

        .archive-modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .archive-modal-title {
            font-size: 16px;
            font-weight: 700;
        }

        .archive-modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 20px;
            line-height: 1;
            padding: 4px;
        }

        .archive-modal-close:hover {
            color: var(--text);
        }

        .archive-modal-body {
            padding: 20px;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.7;
            color: var(--text-muted);
            white-space: pre-wrap;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }

        /* ===== Milestone management ===== */
        .milestone-local-badge {
            font-size: 10px;
            font-weight: 700;
            padding: 1px 6px;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: var(--amber);
            background: var(--amber-bg);
            border: 1px solid rgba(245,158,11,0.2);
            flex-shrink: 0;
        }

        .milestone-add-row {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border);
        }

        .milestone-add-input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 10px;
            color: var(--text);
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .milestone-add-input:focus {
            border-color: var(--blue);
        }

        .milestone-add-input::placeholder {
            color: var(--text-dim);
        }

        .milestone-add-btn {
            padding: 6px 14px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-surface);
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .milestone-add-btn:hover {
            border-color: var(--blue);
            color: var(--text);
        }

        /* ===== Collapsible sections ===== */
        .collapsible-hidden {
            display: none;
        }

        .section-expanded .collapsible-hidden {
            display: flex;
        }

        .section-expand-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            padding: 12px;
            margin-top: 4px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-surface);
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .section-expand-btn:hover {
            border-color: var(--blue);
            color: var(--text);
        }

        .section-expand-btn.expanded svg {
            transform: rotate(180deg);
        }

        /* ===== Responsive ===== */
        @media (max-width: 1100px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .projects-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 640px) {
            .main { padding: 16px; }
            .header { padding: 0 16px; }
            .stats-row { grid-template-columns: 1fr; }
            .header-subtitle, .header-divider { display: none; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <span class="header-title">Pacific Enclosures</span>
            <div class="header-divider"></div>
            <span class="header-subtitle">Development Project Management</span>
            <div class="header-right">
                <button class="btn-download" onclick="exportDataJson()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Export Data
                </button>
                <button class="btn-download" onclick="downloadWeeklyReport()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                    Weekly Report
                </button>
                <span class="header-date" id="headerDate"></span>
            </div>
        </div>
    </header>

    <main class="main">
        <!-- Summary Stats -->
        <div class="stats-row" id="statsRow"></div>

        <!-- Project Cards -->
        <div class="section-title">Projects</div>
        <div class="projects-grid" id="projectsGrid"></div>

        <!-- Completed Projects -->
        <div class="section-title" id="completedTitle" style="display:none;">Completed</div>
        <div class="projects-grid" id="completedGrid"></div>

        <!-- Timeline -->
        <div class="section-title">Timeline</div>
        <div class="timeline" id="timeline"></div>

        <!-- Activity Feed -->
        <div class="section-title">Recent Activity</div>
        <div class="activity-feed" id="activityFeed"></div>

        <!-- Weekly Archive -->
        <div class="section-title">Weekly Archive</div>
        <div class="archive-list" id="archiveList"></div>
    </main>

    <!-- Archive Preview Modal -->
    <div class="archive-modal-overlay" id="archiveModal" onclick="closeArchiveModal(event)">
        <div class="archive-modal">
            <div class="archive-modal-header">
                <span class="archive-modal-title" id="archiveModalTitle">Weekly Summary</span>
                <button class="archive-modal-close" onclick="closeArchiveModal()">&times;</button>
            </div>
            <div class="archive-modal-body" id="archiveModalBody"></div>
        </div>
    </div>

    <script>
    /* ==================================================================
       DATA — loaded from data.json
       All project updates go in data.json, not here.
       ================================================================== */
    let PROJECTS = [];
    let ORIGINAL_PROJECTS = [];
    let TIMELINE = [];
    let ACTIVITY = [];
    let WEEKLY_SUMMARIES = [];
    const MILESTONE_KEY = 'pe-milestone-overrides';

    /* ==================================================================
       RENDER FUNCTIONS
       ================================================================== */

    function renderDate() {
        const now = new Date();
        document.getElementById('headerDate').textContent = now.toLocaleDateString('en-US', {
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
        });
    }

    function renderStats() {
        const totalProjects = PROJECTS.length;
        const completedTasks = PROJECTS.reduce((sum, p) => sum + p.milestones.filter(m => m.done).length, 0);
        const inProgressTasks = PROJECTS.reduce((sum, p) => sum + p.milestones.filter(m => m.current).length, 0);
        const totalTasks = PROJECTS.reduce((sum, p) => sum + p.milestones.length, 0);
        const avgProgress = PROJECTS.length > 0 ? Math.round(PROJECTS.reduce((sum, p) => {
            const t = p.milestones.length;
            const d = p.milestones.filter(m => m.done).length;
            return sum + (t > 0 ? (d / t) * 100 : 0);
        }, 0) / PROJECTS.length) : 0;

        const stats = [
            { value: totalProjects, label: 'Active Projects', icon: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>`, bg: '#eff6ff', color: '#3b82f6' },
            { value: `${completedTasks}/${totalTasks}`, label: 'Tasks Completed', icon: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>`, bg: '#f0fdf4', color: '#22c55e' },
            { value: inProgressTasks, label: 'In Progress', icon: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`, bg: '#fffbeb', color: '#f59e0b' },
            { value: `${avgProgress}%`, label: 'Avg. Progress', icon: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>`, bg: 'var(--purple-bg)', color: 'var(--purple)' },
        ];

        document.getElementById('statsRow').innerHTML = stats.map(s => `
            <div class="stat-card">
                <div class="stat-icon" style="background: ${s.bg}; color: ${s.color};">${s.icon}</div>
                <div>
                    <div class="stat-value" style="color: ${s.color};">${s.value}</div>
                    <div class="stat-label">${s.label}</div>
                </div>
            </div>
        `).join('');
    }

    function renderProjectCard(p) {
            const statusClass = {
                active: 'badge-active', planning: 'badge-planning',
                review: 'badge-review', paused: 'badge-paused',
                pipeline: 'badge-pipeline',
                production: 'badge-production', beta: 'badge-beta'
            }[p.status] || 'badge-active';

            // Auto-calculate progress from milestones
            const totalMs = p.milestones.length;
            const doneMs = p.milestones.filter(m => m.done).length;
            const progress = totalMs > 0 ? Math.round((doneMs / totalMs) * 100) : 0;
            const isCompleted = totalMs > 0 && doneMs === totalMs;

            function renderMilestoneItem(m, idx) {
                const localBadge = m._local ? '<span class="milestone-local-badge">Local</span>' : '';
                return `<div class="milestone-item">
                    <div class="milestone-check ${m.done ? 'done' : ''} ${m.current ? 'current' : ''}" onclick="toggleMilestoneCheck('${p.id}', ${idx})" style="cursor:pointer;">
                        <svg viewBox="0 0 10 10" fill="none" stroke="white" stroke-width="2"><polyline points="2,5 4,7 8,3"/></svg>
                    </div>
                    <span class="milestone-text ${m.done ? 'done' : ''} ${m.current ? 'current' : ''}">${m.text}</span>
                    ${localBadge}
                    <span class="milestone-date">${m.date}</span>
                </div>`;
            }

            const currentMs = p.milestones.map((m, i) => ({ m, i })).filter(x => x.m.current);
            const upcomingMs = p.milestones.map((m, i) => ({ m, i })).filter(x => !x.m.done && !x.m.current).slice(0, 2);
            const allMilestonesHTML = p.milestones.map((m, i) => renderMilestoneItem(m, i)).join('');

            // Build summary section (always visible)
            let summaryHTML = '';
            if (currentMs.length > 0) {
                summaryHTML += `<div class="milestone-section-label current-label">Current</div>`;
                summaryHTML += currentMs.map(x => renderMilestoneItem(x.m, x.i)).join('');
            }
            if (upcomingMs.length > 0) {
                summaryHTML += `<div class="milestone-section-label upcoming-label">Up Next</div>`;
                summaryHTML += upcomingMs.map(x => renderMilestoneItem(x.m, x.i)).join('');
            }

            const techTags = p.tech.map(t => `<span class="meta-tag tech">${t}</span>`).join('');

            const addInput = `
                <div class="milestone-add-row">
                    <input type="text" id="add-milestone-${p.id}" class="milestone-add-input" placeholder="Add milestone..." onkeydown="if(event.key==='Enter')addMilestone('${p.id}')">
                    <button class="milestone-add-btn" onclick="addMilestone('${p.id}')">+ Add</button>
                </div>`;

            const completedBadge = isCompleted ? '<span class="project-status-badge badge-completed">completed</span>' : '';

            return `
                <div class="project-card${isCompleted ? ' completed-card' : ''}">
                    <div class="project-card-header">
                        <div>
                            <div class="project-name">${p.name}</div>
                            <div class="project-desc">${p.description}</div>
                        </div>
                        <div style="display:flex;gap:6px;align-items:flex-start;flex-shrink:0;">
                            <span class="project-status-badge ${statusClass}">${p.status}</span>
                            ${completedBadge}
                        </div>
                    </div>
                    <div class="project-progress">
                        <div class="progress-header">
                            <span class="progress-label">Progress</span>
                            <span class="progress-percent">${progress}%</span>
                        </div>
                        <div class="progress-track">
                            <div class="progress-fill" style="width: ${progress}%;"></div>
                        </div>
                    </div>
                    <div class="project-meta">
                        <span class="meta-tag version">${p.version}</span>
                        ${techTags}
                        <span class="meta-tag deploy">${p.deployment}</span>
                    </div>
                    <div class="project-milestones">
                        <div class="milestones-header">
                            Milestones
                            <span class="milestones-done-badge">${doneMs} completed</span>
                        </div>
                        <div class="milestones-summary">
                            ${summaryHTML}
                        </div>
                        <button class="milestones-expand" onclick="toggleMilestones(this)">
                            <span>Show all ${totalMs} milestones</span>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                        </button>
                        <div class="milestones-full">
                            ${allMilestonesHTML}
                            ${addInput}
                        </div>
                    </div>
                </div>
            `;
    }

    function renderProjects() {
        const active = PROJECTS.filter(p => {
            const totalMs = p.milestones.length;
            const doneMs = p.milestones.filter(m => m.done).length;
            return totalMs === 0 || doneMs < totalMs;
        });
        const completed = PROJECTS.filter(p => {
            const totalMs = p.milestones.length;
            const doneMs = p.milestones.filter(m => m.done).length;
            return totalMs > 0 && doneMs === totalMs;
        });

        document.getElementById('projectsGrid').innerHTML = active.map(p => renderProjectCard(p)).join('');

        const completedTitle = document.getElementById('completedTitle');
        const completedGrid = document.getElementById('completedGrid');
        if (completed.length > 0) {
            completedTitle.style.display = '';
            completedGrid.innerHTML = completed.map(p => renderProjectCard(p)).join('');
        } else {
            completedTitle.style.display = 'none';
            completedGrid.innerHTML = '';
        }
    }

    function renderTimeline() {
        const TIMELINE_LIMIT = 5;
        const container = document.getElementById('timeline');
        const items = TIMELINE.map((item, i) => {
            const projectColors = {
                'job-costing': { bg: 'var(--green-bg)', color: 'var(--green)' },
                'estimator': { bg: 'var(--amber-bg)', color: 'var(--amber)' },
                'pm': { bg: 'var(--purple-bg)', color: 'var(--purple)' },
            };
            const pc = projectColors[item.project] || { bg: 'var(--blue-glow)', color: 'var(--blue)' };
            const projectName = {
                'job-costing': 'Job Costing',
                'estimator': 'Estimator',
                'pm': 'PM Dashboard',
            }[item.project] || item.project;

            return `
                <div class="timeline-item ${i >= TIMELINE_LIMIT ? 'collapsible-hidden' : ''}">
                    <div class="timeline-line">
                        <div class="timeline-dot ${item.color}"></div>
                        ${i < TIMELINE.length - 1 ? '<div class="timeline-connector"></div>' : ''}
                    </div>
                    <div class="timeline-content">
                        <div class="timeline-date">${item.date}</div>
                        <div class="timeline-title">${item.title}</div>
                        <div class="timeline-desc">${item.desc}</div>
                        <span class="timeline-project-tag" style="background: ${pc.bg}; color: ${pc.color};">${projectName}</span>
                    </div>
                </div>
            `;
        }).join('');

        const expandBtn = TIMELINE.length > TIMELINE_LIMIT ? `
            <button class="section-expand-btn" onclick="toggleSection(this, 'timeline')">
                <span>Show all ${TIMELINE.length} entries</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </button>` : '';

        container.innerHTML = items + expandBtn;
    }

    function renderActivity() {
        const ACTIVITY_LIMIT = 8;
        const container = document.getElementById('activityFeed');
        const items = ACTIVITY.map((a, i) => `
            <div class="activity-item ${i >= ACTIVITY_LIMIT ? 'collapsible-hidden' : ''}">
                <div class="activity-icon" style="background: ${a.color};">${a.icon}</div>
                <div class="activity-text">${a.text}</div>
                <span class="activity-time">${a.time}</span>
            </div>
        `).join('');

        const expandBtn = ACTIVITY.length > ACTIVITY_LIMIT ? `
            <button class="section-expand-btn" onclick="toggleSection(this, 'activity')">
                <span>Show all ${ACTIVITY.length} entries</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </button>` : '';

        container.innerHTML = items + expandBtn;
    }

    /* ===== Toggle collapsible sections ===== */
    function toggleSection(btn, sectionId) {
        const container = btn.parentElement;
        const isExpanded = container.classList.toggle('section-expanded');
        btn.classList.toggle('expanded');
        const totalCount = container.querySelectorAll('.collapsible-hidden').length +
                           container.querySelectorAll(':scope > :not(.collapsible-hidden):not(.section-expand-btn)').length;
        btn.querySelector('span').textContent = isExpanded ? 'Show less' : `Show all ${totalCount} entries`;
    }

    /* ===== Toggle milestones ===== */
    function toggleMilestones(btn) {
        const fullList = btn.nextElementSibling;
        const isExpanded = fullList.classList.toggle('expanded');
        btn.classList.toggle('expanded');
        const totalCount = fullList.querySelectorAll('.milestone-item').length;
        btn.querySelector('span').textContent = isExpanded ? 'Hide milestones' : `Show all ${totalCount} milestones`;
    }

    /* ===== Weekly Report Generation ===== */
    function generateWeeklyReportHTML() {
        const now = new Date();
        const weekAgo = new Date(now);
        weekAgo.setDate(weekAgo.getDate() - 7);

        const fmtDate = d => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        const weekStart = fmtDate(weekAgo);
        const weekEnd = fmtDate(now);
        const dateStr = now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

        function isWithinWeek(dateStr) {
            const parsed = new Date(dateStr);
            if (!isNaN(parsed)) return parsed >= weekAgo && parsed <= now;
            return false;
        }

        const recentTimeline = TIMELINE.filter(t => isWithinWeek(t.date));
        const recentActivity = ACTIVITY.slice(0, 10);

        // Stats
        const totalMilestones = PROJECTS.reduce((s, p) => s + p.milestones.length, 0);
        const doneMilestones = PROJECTS.reduce((s, p) => s + p.milestones.filter(m => m.done).length, 0);
        const remaining = totalMilestones - doneMilestones;
        const overallPct = totalMilestones > 0 ? Math.round((doneMilestones / totalMilestones) * 100) : 0;
        const donutColor = overallPct >= 60 ? '#22c55e' : overallPct >= 30 ? '#3b82f6' : '#f59e0b';

        // In progress
        const inProgress = [];
        for (const p of PROJECTS) {
            for (const m of p.milestones) {
                if (m.current) inProgress.push({ project: p.name, text: m.text });
            }
        }

        // Project rows
        const statusColors = { production:'#22c55e', beta:'#f59e0b', active:'#22c55e', planning:'#f59e0b', review:'#a78bfa', paused:'#ef4444', pipeline:'#64748b' };
        let projectRows = '';
        for (const p of PROJECTS) {
            const total = p.milestones.length;
            const done = p.milestones.filter(m => m.done).length;
            const pct = total > 0 ? Math.round((done / total) * 100) : 0;
            const sc = statusColors[p.status] || '#64748b';
            const bc = pct >= 60 ? '#22c55e' : pct >= 30 ? '#3b82f6' : '#f59e0b';
            const currentTasks = p.milestones.filter(m => m.current).map(m => m.text);
            const currentHtml = currentTasks.length > 0 ? `<div style="font-size:12px;color:#94a3b8;margin-top:4px;">Current: ${currentTasks.join(', ')}</div>` : '';
            const r = parseInt(sc.slice(1,3),16), g = parseInt(sc.slice(3,5),16), b = parseInt(sc.slice(5,7),16);
            projectRows += `
            <tr>
                <td style="padding:12px 16px;">
                    <div style="font-weight:600;color:#f1f5f9;">${p.name}</div>
                    <div style="font-size:12px;color:#64748b;">${p.version || ''}</div>
                    ${currentHtml}
                </td>
                <td style="padding:12px 16px;text-align:center;">
                    <span style="display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700;text-transform:uppercase;color:${sc};background:rgba(${r},${g},${b},0.15);">${p.status}</span>
                </td>
                <td style="padding:12px 16px;text-align:center;color:#94a3b8;font-size:13px;">${done}/${total}</td>
                <td style="padding:12px 16px;width:200px;">
                    <div style="display:flex;align-items:center;gap:10px;">
                        <div style="flex:1;height:8px;background:#1e293b;border-radius:4px;overflow:hidden;">
                            <div style="width:${pct}%;height:100%;background:${bc};border-radius:4px;"></div>
                        </div>
                        <span style="font-size:13px;font-weight:600;color:${bc};min-width:36px;text-align:right;">${pct}%</span>
                    </div>
                </td>
            </tr>`;
        }

        // Timeline HTML
        const dotColors = { green:'#22c55e', blue:'#3b82f6', amber:'#f59e0b', purple:'#a78bfa' };
        let timelineHtml = '';
        if (recentTimeline.length > 0) {
            for (const t of recentTimeline.slice(0, 8)) {
                const dot = dotColors[t.color] || '#3b82f6';
                timelineHtml += `
                <div style="display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #1e293b;">
                    <div style="width:8px;height:8px;border-radius:50%;background:${dot};margin-top:6px;flex-shrink:0;"></div>
                    <div>
                        <div style="font-size:12px;color:#64748b;">${t.date}</div>
                        <div style="font-size:13px;color:#f1f5f9;font-weight:600;">${t.title}</div>
                        <div style="font-size:12px;color:#94a3b8;margin-top:2px;">${t.desc}</div>
                    </div>
                </div>`;
            }
        } else {
            timelineHtml = '<div style="padding:16px;color:#64748b;font-size:13px;">No timeline events this week.</div>';
        }

        // Activity HTML
        let activityHtml = '';
        for (const a of recentActivity) {
            activityHtml += `
            <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1e293b;">
                <span style="font-size:16px;">${a.icon}</span>
                <span style="flex:1;font-size:13px;color:#94a3b8;">${a.text}</span>
                <span style="font-size:11px;color:#64748b;white-space:nowrap;">${a.time}</span>
            </div>`;
        }

        // In progress section
        let inProgressSection = '';
        if (inProgress.length > 0) {
            let ipItems = '';
            for (const item of inProgress) {
                ipItems += `<div style="padding:6px 0;font-size:13px;color:#94a3b8;border-bottom:1px solid #1e293b;">\u26a1 <strong style="color:#f1f5f9;">${item.project}</strong> \u2014 ${item.text}</div>`;
            }
            inProgressSection = `
            <div style="background:#1e293b;border-radius:12px;border:1px solid #334155;overflow:hidden;margin-bottom:24px;">
                <div style="padding:16px 16px 12px;border-bottom:1px solid #334155;">
                    <div style="font-size:16px;font-weight:700;color:#f1f5f9;">\ud83d\udd25 In Progress</div>
                </div>
                <div style="padding:12px 16px;">${ipItems}</div>
            </div>`;
        }

        // Completed projects section
        let completedSection = '';
        const completedProjects = PROJECTS.filter(p => {
            const t = p.milestones.length;
            const d = p.milestones.filter(m => m.done).length;
            return t > 0 && d === t;
        });
        if (completedProjects.length > 0) {
            let cpItems = '';
            for (const p of completedProjects) {
                const total = p.milestones.length;
                const techStr = p.tech.join(', ');
                cpItems += `
                <div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #1e293b;">
                    <span style="font-size:20px;">\ud83c\udfc6</span>
                    <div style="flex:1;">
                        <div style="font-weight:600;color:#f1f5f9;">${p.name}</div>
                        <div style="font-size:12px;color:#94a3b8;">${total}/${total} milestones \u2022 ${techStr} \u2022 ${p.deployment}</div>
                    </div>
                    <span style="display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700;color:#22c55e;background:rgba(34,197,94,0.15);">100%</span>
                </div>`;
            }
            completedSection = `
            <div style="background:#1e293b;border-radius:12px;border:1px solid rgba(34,197,94,0.3);overflow:hidden;margin-bottom:24px;">
                <div style="padding:16px 16px 12px;border-bottom:1px solid #334155;">
                    <div style="font-size:16px;font-weight:700;color:#22c55e;">\ud83c\udfc6 Completed Projects</div>
                </div>
                <div style="padding:12px 16px;">${cpItems}</div>
            </div>`;
        }

        return `<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>PE Weekly Report \u2014 ${weekEnd}</title></head>
<body style="margin:0;padding:0;background:#0f172a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
<div style="max-width:700px;margin:0 auto;padding:24px;">
    <div style="text-align:center;padding:32px 0 24px;">
        <div style="font-size:24px;font-weight:800;color:#f1f5f9;">Pacific Enclosures</div>
        <div style="font-size:14px;color:#64748b;margin-top:4px;">Weekly Project Report</div>
        <div style="font-size:13px;color:#3b82f6;margin-top:8px;">${weekStart} \u2013 ${weekEnd}</div>
    </div>
    <div style="display:flex;gap:12px;margin-bottom:24px;">
        <div style="flex:1;background:#1e293b;border-radius:12px;padding:20px;text-align:center;border:1px solid #334155;">
            <div style="font-size:28px;font-weight:800;color:${donutColor};">${overallPct}%</div>
            <div style="font-size:11px;color:#64748b;margin-top:4px;">Overall Progress</div>
        </div>
        <div style="flex:1;background:#1e293b;border-radius:12px;padding:20px;text-align:center;border:1px solid #334155;">
            <div style="font-size:28px;font-weight:800;color:#22c55e;">${doneMilestones}</div>
            <div style="font-size:11px;color:#64748b;margin-top:4px;">Tasks Done</div>
        </div>
        <div style="flex:1;background:#1e293b;border-radius:12px;padding:20px;text-align:center;border:1px solid #334155;">
            <div style="font-size:28px;font-weight:800;color:#f59e0b;">${remaining}</div>
            <div style="font-size:11px;color:#64748b;margin-top:4px;">Remaining</div>
        </div>
        <div style="flex:1;background:#1e293b;border-radius:12px;padding:20px;text-align:center;border:1px solid #334155;">
            <div style="font-size:28px;font-weight:800;color:#a78bfa;">${PROJECTS.length}</div>
            <div style="font-size:11px;color:#64748b;margin-top:4px;">Projects</div>
        </div>
    </div>
    <div style="background:#1e293b;border-radius:12px;border:1px solid #334155;overflow:hidden;margin-bottom:24px;">
        <div style="padding:16px 16px 12px;border-bottom:1px solid #334155;">
            <div style="font-size:16px;font-weight:700;color:#f1f5f9;">Project Progress</div>
        </div>
        <table style="width:100%;border-collapse:collapse;">
            <thead>
                <tr style="border-bottom:1px solid #334155;">
                    <th style="padding:10px 16px;text-align:left;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;">Project</th>
                    <th style="padding:10px 16px;text-align:center;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;">Status</th>
                    <th style="padding:10px 16px;text-align:center;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;">Done</th>
                    <th style="padding:10px 16px;text-align:left;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;">Progress</th>
                </tr>
            </thead>
            <tbody>${projectRows}</tbody>
        </table>
    </div>
    ${completedSection}
    ${inProgressSection}
    <div style="background:#1e293b;border-radius:12px;border:1px solid #334155;overflow:hidden;margin-bottom:24px;">
        <div style="padding:16px 16px 12px;border-bottom:1px solid #334155;">
            <div style="font-size:16px;font-weight:700;color:#f1f5f9;">\ud83d\udcc5 This Week</div>
        </div>
        <div style="padding:12px 16px;">${timelineHtml}</div>
    </div>
    <div style="background:#1e293b;border-radius:12px;border:1px solid #334155;overflow:hidden;margin-bottom:24px;">
        <div style="padding:16px 16px 12px;border-bottom:1px solid #334155;">
            <div style="font-size:16px;font-weight:700;color:#f1f5f9;">\u26a1 Recent Activity</div>
        </div>
        <div style="padding:12px 16px;">${activityHtml}</div>
    </div>
    <div style="text-align:center;padding:24px 0;color:#64748b;font-size:12px;">
        Generated from PE PM Dashboard \u2014 ${dateStr}<br>
        <a href="https://claytonjamescreed-sudo.github.io/pe-pm-dashboard/" style="color:#3b82f6;text-decoration:none;">View Dashboard \u2192</a>
    </div>
</div>
</body>
</html>`;
    }

    function downloadWeeklyReport() {
        const html = generateWeeklyReportHTML();
        const now = new Date();
        const dateSlug = now.toISOString().slice(0, 10);
        const blob = new Blob([html], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `PE-Weekly-Report-${dateSlug}.html`;
        a.click();
        URL.revokeObjectURL(url);
    }

    /* ===== Archive Storage ===== */
    const ARCHIVE_KEY = 'pe-weekly-archive';

    function getLocalArchive() {
        try {
            return JSON.parse(localStorage.getItem(ARCHIVE_KEY) || '[]');
        } catch { return []; }
    }

    function saveToArchive(weekStart, weekEnd, generatedAt, markdown) {
        const archive = getLocalArchive();
        const dateSlug = generatedAt.slice(0, 10);
        // Avoid duplicates for same date
        const existing = archive.findIndex(a => a.dateSlug === dateSlug);
        const entry = { dateSlug, weekStart, weekEnd, generatedAt, markdown };
        if (existing >= 0) {
            archive[existing] = entry;
        } else {
            archive.unshift(entry);
        }
        localStorage.setItem(ARCHIVE_KEY, JSON.stringify(archive));
    }

    function getMergedArchive() {
        const local = getLocalArchive();
        const saved = WEEKLY_SUMMARIES || [];
        // Clean up: remove local entries that have a committed version covering the same week
        const savedRanges = new Set(saved.map(s => `${s.weekStart}|${s.weekEnd}`));
        const savedSlugs = new Set(saved.map(s => s.dateSlug));
        const cleanedLocal = local.filter(l => {
            const rangeKey = `${l.weekStart}|${l.weekEnd}`;
            return !savedSlugs.has(l.dateSlug) && !savedRanges.has(rangeKey);
        });
        if (cleanedLocal.length !== local.length) {
            localStorage.setItem(ARCHIVE_KEY, JSON.stringify(cleanedLocal));
        }
        // Only show committed entries + any remaining local ones
        const map = new Map();
        for (const entry of cleanedLocal) {
            map.set(entry.dateSlug, { ...entry, source: 'local' });
        }
        for (const entry of saved) {
            map.set(entry.dateSlug, { ...entry, source: 'saved' });
        }
        // Sort newest first
        return Array.from(map.values()).sort((a, b) => b.dateSlug.localeCompare(a.dateSlug));
    }

    function renderArchive() {
        const archive = getMergedArchive();
        const container = document.getElementById('archiveList');
        if (archive.length === 0) {
            container.innerHTML = `<div class="archive-empty">No weekly summaries yet. Click "Weekly Summary" to generate your first one.</div>`;
            return;
        }
        container.innerHTML = archive.map((entry, i) => `
            <div class="archive-item">
                <div class="archive-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                </div>
                <div class="archive-info">
                    <div class="archive-week">${entry.weekStart} \u2013 ${entry.weekEnd}</div>
                    <div class="archive-generated">Generated ${new Date(entry.generatedAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' })}</div>
                </div>
                <span class="archive-source ${entry.source}">${entry.source === 'saved' ? 'Committed' : 'Local'}</span>
                <div class="archive-actions">
                    <button class="archive-btn" onclick="viewArchiveSummary(${i})">View</button>
                    <button class="archive-btn" onclick="downloadArchiveSummary(${i})">Download</button>
                </div>
            </div>
        `).join('');
    }

    function viewArchiveSummary(index) {
        const archive = getMergedArchive();
        const entry = archive[index];
        if (!entry) return;
        document.getElementById('archiveModalTitle').textContent = `${entry.weekStart} \u2013 ${entry.weekEnd}`;
        document.getElementById('archiveModalBody').textContent = entry.markdown;
        document.getElementById('archiveModal').classList.add('visible');
    }

    function closeArchiveModal(event) {
        if (event && event.target !== event.currentTarget) return;
        document.getElementById('archiveModal').classList.remove('visible');
    }

    function downloadArchiveSummary(index) {
        const archive = getMergedArchive();
        const entry = archive[index];
        if (!entry) return;
        const blob = new Blob([entry.markdown], { type: 'text/markdown' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `PE-Weekly-Summary-${entry.dateSlug}.md`;
        a.click();
        URL.revokeObjectURL(url);
    }

    /* ===== Milestone Management ===== */
    function getMilestoneOverrides() {
        try { return JSON.parse(localStorage.getItem(MILESTONE_KEY) || '{}'); }
        catch { return {}; }
    }

    function saveMilestoneOverrides(overrides) {
        localStorage.setItem(MILESTONE_KEY, JSON.stringify(overrides));
    }

    function applyMilestoneOverrides() {
        const overrides = getMilestoneOverrides();
        // Deep clone original projects
        PROJECTS = JSON.parse(JSON.stringify(ORIGINAL_PROJECTS));
        for (const p of PROJECTS) {
            const po = overrides[p.id];
            if (!po) continue;
            // Apply toggles
            if (po.toggles) {
                for (const [idx, done] of Object.entries(po.toggles)) {
                    const i = parseInt(idx);
                    if (p.milestones[i]) {
                        p.milestones[i].done = done;
                        p.milestones[i]._local = true;
                    }
                }
            }
            // Append added milestones
            if (po.added) {
                for (const m of po.added) {
                    p.milestones.push({ text: m.text, done: m.done || false, date: m.date || 'Local', _local: true, _added: true });
                }
            }
        }
    }

    function toggleMilestoneCheck(projectId, milestoneIdx) {
        const overrides = getMilestoneOverrides();
        if (!overrides[projectId]) overrides[projectId] = {};
        if (!overrides[projectId].toggles) overrides[projectId].toggles = {};
        // Find current state
        const project = PROJECTS.find(p => p.id === projectId);
        if (!project || !project.milestones[milestoneIdx]) return;
        const newDone = !project.milestones[milestoneIdx].done;
        // Check if this matches original — if so, remove the override
        const orig = ORIGINAL_PROJECTS.find(p => p.id === projectId);
        if (orig && orig.milestones[milestoneIdx] && orig.milestones[milestoneIdx].done === newDone) {
            delete overrides[projectId].toggles[milestoneIdx];
            if (Object.keys(overrides[projectId].toggles).length === 0) delete overrides[projectId].toggles;
            if (Object.keys(overrides[projectId]).length === 0) delete overrides[projectId];
        } else {
            overrides[projectId].toggles[milestoneIdx] = newDone;
        }
        saveMilestoneOverrides(overrides);
        applyMilestoneOverrides();
        renderStats();
        renderProjects();
    }

    function addMilestone(projectId) {
        const input = document.getElementById(`add-milestone-${projectId}`);
        const text = input.value.trim();
        if (!text) return;
        const overrides = getMilestoneOverrides();
        if (!overrides[projectId]) overrides[projectId] = {};
        if (!overrides[projectId].added) overrides[projectId].added = [];
        overrides[projectId].added.push({ text, done: false, date: 'Local' });
        saveMilestoneOverrides(overrides);
        input.value = '';
        applyMilestoneOverrides();
        renderStats();
        renderProjects();
    }

    function exportDataJson() {
        // Build data.json with local overrides baked in
        const data = {
            projects: PROJECTS.map(p => ({
                ...p,
                milestones: p.milestones.map(m => {
                    const clean = { text: m.text, done: m.done, date: m.date };
                    if (m.current) clean.current = true;
                    return clean;
                })
            })),
            timeline: TIMELINE,
            activity: ACTIVITY,
            weeklySummaries: WEEKLY_SUMMARIES
        };
        const blob = new Blob([JSON.stringify(data, null, 2) + '\n'], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'data.json';
        a.click();
        URL.revokeObjectURL(url);
    }

    /* ===== Init — fetch data.json then render ===== */
    async function init() {
        renderDate();
        try {
            const resp = await fetch('data.json');
            const data = await resp.json();
            ORIGINAL_PROJECTS = data.projects || [];
            TIMELINE = data.timeline || [];
            ACTIVITY = data.activity || [];
            WEEKLY_SUMMARIES = data.weeklySummaries || [];
        } catch (e) {
            console.error('Failed to load data.json:', e);
        }
        // Clean stale milestone overrides that match original data
        const overrides = getMilestoneOverrides();
        let overridesChanged = false;
        for (const [pid, po] of Object.entries(overrides)) {
            const orig = ORIGINAL_PROJECTS.find(p => p.id === pid);
            if (!orig) continue;
            if (po.toggles) {
                for (const [idx, done] of Object.entries(po.toggles)) {
                    if (orig.milestones[idx] && orig.milestones[idx].done === done) {
                        delete po.toggles[idx];
                        overridesChanged = true;
                    }
                }
                if (Object.keys(po.toggles).length === 0) { delete po.toggles; overridesChanged = true; }
            }
            if (!po.toggles && !po.added) { delete overrides[pid]; overridesChanged = true; }
        }
        if (overridesChanged) saveMilestoneOverrides(overrides);

        applyMilestoneOverrides();
        renderStats();
        renderProjects();
        renderTimeline();
        renderActivity();
        renderArchive();
    }
    init();
    </script>
