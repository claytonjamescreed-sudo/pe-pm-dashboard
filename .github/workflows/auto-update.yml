name: Auto-Update Activity from Commits

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'  # Weekly on Monday at 9am UTC

jobs:
  update-activity:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch commits and update data.json
        env:
          GH_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
        run: python scripts/update_from_commits.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet data.json && echo "No changes" && exit 0
          git add data.json
          git commit -m "Auto-update activity from recent commits"
          git push
