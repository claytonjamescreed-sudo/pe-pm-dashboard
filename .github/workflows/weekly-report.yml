name: Weekly PM Report

on:
  workflow_dispatch:
  schedule:
    - cron: '30 23 * * 5'  # Friday at 3:30pm PST (11:30pm UTC)

jobs:
  send-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate report, archive, and email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REPORT_EMAIL: claytonjamescreed@gmail.com
          SAVE_ARCHIVE: 'true'
        run: python scripts/generate_weekly_report.py

      - name: Commit archived summary
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet data.json && echo "No archive changes" && exit 0
          git add data.json
          git commit -m "Archive weekly report summary"
          git push
